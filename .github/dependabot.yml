# Automated dependency updates (OpenSSF Scorecard: Dependency-Update-Tool).
version: 2
updates:
  # Frontend packages — "npm" is Dependabot's ecosystem for pnpm too
  # (it reads pnpm-lock.yaml; there is no separate "pnpm" value).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Backend packages — native uv ecosystem (reads pyproject.toml + uv.lock)
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions — keeps the pinned action SHAs current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
